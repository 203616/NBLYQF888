# 亮叶企服 - Nginx 配置
# 部署路径: /etc/nginx/sites-enabled/nblyqf.conf

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name nblyqf.com www.nblyqf.com;
    return 301 https://$host$request_uri;
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name nblyqf.com www.nblyqf.com;

    # SSL 证书路径（部署前请将证书文件放在 /etc/nginx/ssl/ 目录）
    ssl_certificate /etc/nginx/ssl/nblyqf.com.pem;
    ssl_certificate_key /etc/nginx/ssl/nblyqf.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 反向代理到 Node.js 应用
    location / {
        proxy_pass http://127.0.0.1:4008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（用于 AI 聊天等）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:4008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
