name: Publish Mini Program

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'
      desc:
        description: '上传说明'
        required: true
        default: 'CI 体验版'
      upload_cdn:
        description: '同时上传 CDN 到 OSS'
        type: boolean
        default: false

# Secrets 配置说明见 .github/SECRETS.md

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Production env template check
        run: node scripts/verify-env-template.js

      - name: CI verify
        run: pnpm ci:verify

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Sync production config
        run: pnpm sync:prod

      - name: Prepare CDN bundle
        if: inputs.upload_cdn == true
        run: pnpm prepare:cdn

      - name: Upload CDN to OSS
        if: inputs.upload_cdn == true
        env:
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
        run: pnpm upload:cdn

      - name: Write WeChat upload key
        env:
          WECHAT_UPLOAD_PRIVATE_KEY: ${{ secrets.WECHAT_UPLOAD_PRIVATE_KEY }}
        run: |
          if [ -z "$WECHAT_UPLOAD_PRIVATE_KEY" ]; then
            echo "缺少 GitHub Secret: WECHAT_UPLOAD_PRIVATE_KEY"
            echo "配置说明: .github/SECRETS.md"
            exit 1
          fi
          mkdir -p deploy
          printf '%s' "$WECHAT_UPLOAD_PRIVATE_KEY" > deploy/private.key

      - name: Upload mini program
        env:
          WECHAT_UPLOAD_PRIVATE_KEY_PATH: deploy/private.key
          MINIPROGRAM_VERSION: ${{ inputs.version }}
          MINIPROGRAM_DESC: ${{ inputs.desc }}
          MINIPROGRAM_ROBOT: '1'
        run: node scripts/upload-miniprogram-ci.js --set-trial --robot 1 --desc "${{ inputs.desc }}"

      - name: Cleanup upload key
        if: always()
        run: rm -f deploy/private.key
