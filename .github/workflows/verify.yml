name: Mini Program Verify

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: CI verify (pages, assets, bundle, config)
        run: node scripts/ci-verify.js

      - name: CDN upload dry-run
        run: node scripts/upload-cdn-oss.js --dry-run

      - name: Mini program upload dry-run
        run: node scripts/upload-miniprogram-ci.js --dry-run
